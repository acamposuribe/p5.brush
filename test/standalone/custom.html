<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brush.js Standalone Custom Brush Test</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f0e4; font-family: "Iowan Old Style", Palatino, serif; }
      main { width: min(760px, calc(100vw - 32px)); display: grid; gap: 14px; justify-items: center; }
      h1, p { margin: 0; text-align: center; }
      p { max-width: 620px; line-height: 1.45; }
      canvas { width: 600px; height: 600px; border: 1px solid rgba(31,44,51,.16); background: white; }
      code { font-family: Menlo, Monaco, "Courier New", monospace; font-size: 12px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Standalone Custom Brush Test</h1>
      <p>Checks standalone custom tip rasterization on a plain canvas using a small 2D tip surface API.</p>
      <div id="canvas-host"></div>
    </main>
    <script type="module" src="./custom.js"></script>
  </body>
  </html>
