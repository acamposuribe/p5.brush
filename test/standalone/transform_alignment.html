<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brush.js - Standalone Transform Alignment</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: #22313f;
        background:
          radial-gradient(circle at top left, rgba(20, 48, 73, 0.08), transparent 24%),
          linear-gradient(180deg, #f7f2e7 0%, #ece3d3 100%);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      }

      main {
        width: min(920px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 18px 0 24px;
        display: grid;
        justify-items: center;
      }

      main > * { width: 100%; }

      .nav {
        margin-bottom: 14px;
        font: 11px/1.2 Menlo, Monaco, "Courier New", monospace;
      }

      .nav a { color: #153e5c; text-decoration: none; }
      .nav a:hover { text-decoration: underline; }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 3.6vw, 34px);
        letter-spacing: -0.04em;
      }

      p {
        max-width: 760px;
        margin: 0 0 8px;
        color: #52616e;
        line-height: 1.45;
        font-size: 13px;
      }

      #canvas-host {
        margin-top: 18px;
        position: relative;
        width: 760px;
        height: 600px;
        max-width: 100%;
      }

      canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }

      #ref-canvas {
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="nav"><a href="../index.html">All tests</a></div>
      <h1>Standalone Transform Alignment</h1>
      <p>
        Red native canvas references are drawn at the exact same coordinates as the standalone brush marks, so they should align precisely.
      </p>
      <p>
        Columns cover <b>translate(+80, -40)</b>, <b>rotate(25deg)</b>, and <b>scale(1.8)</b>. Row 1 checks strokes and row 2 checks fills.
      </p>
      <div id="canvas-host"></div>

      <script type="module" src="./transform_alignment.js"></script>
    </main>
  </body>
</html>
