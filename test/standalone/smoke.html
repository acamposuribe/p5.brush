<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brush.js Standalone Smoke Test</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f0e4;
        color: #1f2c33;
        font-family: "Iowan Old Style", "Palatino Linotype", Palatino, serif;
      }

      main {
        width: min(760px, calc(100vw - 32px));
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        max-width: 620px;
        text-align: center;
        line-height: 1.45;
      }

      canvas {
        width: 600px;
        height: 600px;
        border: 1px solid rgba(31, 44, 51, 0.16);
        background: white;
      }

      code {
        font-family: Menlo, Monaco, "Courier New", monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Standalone Smoke Test</h1>
      <p>
        Minimal browser test for the standalone build. It loads a plain
        <code>canvas</code>, applies a transform stack, and draws one line plus
        one rectangle.
      </p>
      <div id="canvas-host"></div>
    </main>

    <script type="module" src="./smoke.js"></script>
  </body>
  </html>
