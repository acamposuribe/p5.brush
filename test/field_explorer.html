<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flow Field Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@2.1.1/lib/p5.min.js"></script>
    <script src="../dist/p5.brush.js"></script>
    <style>
      :root {
        --paper: #f3eee2;
        --ink: #22313f;
        --muted: #52616e;
        --line: #d4c8b8;
        --panel: rgba(255, 252, 245, 0.86);
        --accent: #153e5c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(21, 62, 92, 0.08), transparent 24%),
          linear-gradient(180deg, #f7f2e7 0%, #ece3d3 100%);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      }

      main {
        width: min(920px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 18px 0 24px;
        display: grid;
        justify-items: center;
      }

      main > * { width: 100%; }

      .nav {
        margin-bottom: 14px;
        font: 11px/1.2 Menlo, Monaco, "Courier New", monospace;
      }

      .nav a {
        color: var(--accent);
        text-decoration: none;
      }

      .nav a:hover { text-decoration: underline; }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 3.6vw, 34px);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 8px;
        max-width: 760px;
        color: var(--muted);
        line-height: 1.45;
        font-size: 13px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      #controls {
        margin-top: 18px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        font: 11px/1.4 Menlo, Monaco, "Courier New", monospace;
      }

      label { display: flex; align-items: center; gap: 8px; }

      select,
      input[type=range] {
        font: inherit;
      }

      select { padding: 5px 8px; }
      input[type=range] { width: 120px; }
      span.val { width: 28px; display: inline-block; color: var(--accent); }

      #canvas-host {
        margin-top: 18px;
        padding: 10px;
        display: grid;
        justify-content: center;
        width: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        border-radius: 6px;
        max-width: 100%;
        height: auto !important;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="nav"><a href="./index.html">All tests</a></div>
      <h1>Flow Field Explorer</h1>
      <p>
        Interactive browser page for comparing built-in vector fields with adjustable density and flow-line length.
      </p>
      <p>
        Changing any control reloads the page with the current query parameters so the exact view is shareable.
      </p>

      <div id="controls" class="panel">
        <label>
          Field:
          <select id="fieldSel"></select>
        </label>
        <label>
          Density:
          <input type="range" id="density" min="6" max="30" value="18">
          <span class="val" id="densityVal">18</span>
        </label>
        <label>
          Line length:
          <input type="range" id="lineLen" min="20" max="150" value="55">
          <span class="val" id="lineLenVal">55</span>
        </label>
      </div>

      <div id="canvas-host" class="panel"></div>

      <script>
      const FIELDS = ["curved", "zigzag", "waves", "seabed", "spiral", "columns", "hand"];

      // Read current params
      const params = new URLSearchParams(location.search);
      const currentField  = params.get("field")   || "curved";
      const currentDensity = parseInt(params.get("density") || "18");
      const currentLen     = parseInt(params.get("len")     || "55");

      // Populate select
      const sel = document.getElementById("fieldSel");
      FIELDS.forEach((f) => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f;
        if (f === currentField) opt.selected = true;
        sel.appendChild(opt);
      });

      // Sync slider displays
      const densityEl  = document.getElementById("density");
      const densityVal = document.getElementById("densityVal");
      const lineLenEl  = document.getElementById("lineLen");
      const lineLenVal = document.getElementById("lineLenVal");

      densityEl.value  = currentDensity;
      densityVal.textContent = currentDensity;
      lineLenEl.value  = currentLen;
      lineLenVal.textContent = currentLen;

      densityEl.addEventListener("input",  () => { densityVal.textContent = densityEl.value; });
      lineLenEl.addEventListener("input",  () => { lineLenVal.textContent = lineLenEl.value; });

      function navigate() {
        const f = sel.value;
        const d = densityEl.value;
        const l = lineLenEl.value;
        location.search = `?field=${f}&density=${d}&len=${l}`;
      }

      sel.addEventListener("change", navigate);
      densityEl.addEventListener("change", navigate);
      lineLenEl.addEventListener("change", navigate);

      // ---- p5 sketch ----
      function setup() {
        const canvas = createCanvas(800, 800, WEBGL);
        canvas.parent("canvas-host");
        brush.load();
        brush.scaleBrushes(3);
        background(245);
        translate(-width / 2, -height / 2);

        if (currentField === "hand") {
          brush.wiggle(5);
        } else {
          brush.field(currentField);
        }
        brush.set("HB", "#1a2a5a", 1);

        const n = currentDensity;
        for (let r = 0; r < n; r++) {
          for (let c = 0; c < n; c++) {
            const x = 40 + (c / (n - 1)) * 720;
            const y = 40 + (r / (n - 1)) * 720;
            brush.flowLine(x, y, currentLen, 0);
          }
        }

        brush.noField();
        noLoop();
      }

      function draw() {
        translate(-width / 2, -height / 2);
        noLoop();
      }
      </script>
    </main>
  </body>
</html>
