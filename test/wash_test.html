<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wash Test</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@2.1.1/lib/p5.min.js"></script>
    <script src="../dist/p5.brush.js"></script>
    <style>
      :root {
        --paper: #f3eee2;
        --ink: #22313f;
        --muted: #52616e;
        --line: #d4c8b8;
        --panel: rgba(255, 252, 245, 0.86);
        --accent: #153e5c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(21, 62, 92, 0.08), transparent 24%),
          linear-gradient(180deg, #f7f2e7 0%, #ece3d3 100%);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      }

      main {
        width: min(920px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 18px 0 24px;
        display: grid;
        justify-items: center;
      }

      main > * { width: 100%; }

      .nav {
        margin-bottom: 14px;
        font: 11px/1.2 Menlo, Monaco, "Courier New", monospace;
      }

      .nav a {
        color: var(--accent);
        text-decoration: none;
      }

      .nav a:hover { text-decoration: underline; }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 3.6vw, 34px);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 8px;
        max-width: 760px;
        color: var(--muted);
        line-height: 1.45;
        font-size: 13px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .toolbar {
        margin-top: 18px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        font: 11px/1.4 Menlo, Monaco, "Courier New", monospace;
      }

      .seed {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .seed strong {
        color: var(--accent);
        font-weight: 600;
      }

      button {
        border: 1px solid var(--line);
        background: #fbf8f0;
        color: var(--accent);
        font: inherit;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover { background: #f4eee2; }

      #canvas-host {
        margin-top: 16px;
        padding: 10px;
        display: grid;
        justify-content: center;
        width: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        border-radius: 6px;
        max-width: 100%;
        max-height: min(78vh, 760px);
        height: auto !important;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="nav"><a href="./index.html">All tests</a></div>
      <h1>Wash Test</h1>
      <p>
        Direct WEBGL wash test that draws five random rect and circle polygons with palette colors at full opacity.
      </p>
      <p>
        Refresh the seed to regenerate the shape mix and placement while keeping the wash path isolated from fill and stroke.
      </p>

      <div class="toolbar panel">
        <div class="seed">
          <span>Seed</span>
          <strong id="seedVal">000000</strong>
        </div>
        <button id="refreshSeed" type="button">Refresh seed</button>
      </div>

      <div id="canvas-host" class="panel"></div>
    </main>
    <script src="./wash_test.js"></script>
  </body>
</html>
