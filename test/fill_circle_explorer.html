<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fill Circle Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@2.1.1/lib/p5.min.js"></script>
    <script src="../dist/p5.brush.js"></script>
    <style>
      :root {
        --paper: #f3eee2;
        --ink: #22313f;
        --muted: #52616e;
        --line: #d4c8b8;
        --panel: rgba(255, 252, 245, 0.86);
        --accent: #153e5c;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(21, 62, 92, 0.08), transparent 24%),
          linear-gradient(180deg, #f7f2e7 0%, #ece3d3 100%);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      }

      main {
        width: min(920px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 18px 0 24px;
        display: grid;
        justify-items: center;
      }

      main > * { width: 100%; }

      .nav {
        margin-bottom: 14px;
        font: 11px/1.2 Menlo, Monaco, "Courier New", monospace;
      }

      .nav a {
        color: var(--accent);
        text-decoration: none;
      }

      .nav a:hover { text-decoration: underline; }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 3.6vw, 34px);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0 0 8px;
        max-width: 760px;
        color: var(--muted);
        line-height: 1.45;
        font-size: 13px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .workspace {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 260px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      #controls {
        padding: 14px 16px;
        display: grid;
        gap: 12px;
        align-self: start;
      }

      .control-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: center;
        font: 11px/1.4 Menlo, Monaco, "Courier New", monospace;
      }

      label {
        display: grid;
        gap: 6px;
      }

      .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input[type=range] {
        flex: 1;
        min-width: 0;
      }

      .val {
        min-width: 34px;
        color: var(--accent);
        text-align: right;
      }

      .top-row {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: space-between;
        font: 11px/1.4 Menlo, Monaco, "Courier New", monospace;
      }

      .seed {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .seed strong {
        color: var(--accent);
        font-weight: 600;
      }

      button {
        border: 1px solid var(--line);
        background: #fbf8f0;
        color: var(--accent);
        font: inherit;
        padding: 6px 10px;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover { background: #f4eee2; }

      .swatches {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .swatch {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        border: 1px solid rgba(32, 25, 15, 0.18);
        cursor: pointer;
        padding: 0;
      }

      .swatch.active {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      #canvas-host {
        padding: 10px;
        display: grid;
        justify-content: center;
        width: 100%;
        overflow: hidden;
        min-width: 0;
      }

      canvas {
        display: block;
        border-radius: 6px;
        max-width: 100%;
        max-height: min(78vh, 800px);
        height: auto !important;
      }

      @media (max-width: 820px) {
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="nav"><a href="./index.html">All tests</a></div>
      <h1>Fill Circle Explorer</h1>
      <p>
        Seeded browser page for checking watercolor fill behavior on a single centered circle with a fine HB stroke.
      </p>
      <p>
        Use the sliders and palette below to inspect bleed, opacity, texture, and border behavior without changing the seed unless you refresh it.
      </p>

      <div class="workspace">
        <div id="controls" class="panel">
          <div class="top-row">
            <div class="seed">
              <span>Seed</span>
              <strong id="seedVal">000000</strong>
            </div>
            <button id="refreshSeed" type="button">Refresh seed</button>
          </div>

          <div class="control-grid">
            <label>
              Bleed
              <div class="slider-row">
                <input type="range" id="bleed" min="0" max="1" step="0.01" value="0.3" />
                <span class="val" id="bleedVal">0.3</span>
              </div>
            </label>

            <label>
              Opacity
              <div class="slider-row">
                <input type="range" id="opacity" min="0" max="255" step="1" value="92" />
                <span class="val" id="opacityVal">92</span>
              </div>
            </label>

            <label>
              Texture
              <div class="slider-row">
                <input type="range" id="texture" min="0" max="1" step="0.01" value="0.5" />
                <span class="val" id="textureVal">0.5</span>
              </div>
            </label>

            <label>
              Border
              <div class="slider-row">
                <input type="range" id="border" min="0" max="1" step="0.01" value="0.4" />
                <span class="val" id="borderVal">0.4</span>
              </div>
            </label>
          </div>

          <label style="font: 11px/1.4 Menlo, Monaco, 'Courier New', monospace;">
            Color
            <div class="swatches" id="palette"></div>
          </label>
        </div>

        <div id="canvas-host" class="panel"></div>
      </div>

      <script src="./fill_circle_explorer.js"></script>
    </main>
  </body>
</html>
