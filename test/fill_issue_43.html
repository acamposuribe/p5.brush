<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Issue 43 Fill Regression Test</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@2.1.1/lib/p5.min.js"></script>
    <script src="../dist/p5.brush.js"></script>
    <style>
      :root {
        --panel: rgba(255, 252, 245, 0.88);
        --line: #d4c8b8;
        --ink: #22313f;
        --muted: #52616e;
        --accent: #153e5c;
        --ok: #355f27;
        --bad: #8b3328;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(21, 62, 92, 0.08), transparent 24%),
          linear-gradient(180deg, #f7f2e7 0%, #ece3d3 100%);
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif;
      }

      main {
        width: min(1120px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 18px 0 24px;
        display: grid;
        justify-items: center;
      }

      main > * { width: 100%; }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }

      .nav {
        margin-bottom: 14px;
        font: 11px/1.2 Menlo, Monaco, "Courier New", monospace;
      }

      .nav a {
        color: var(--accent);
        text-decoration: none;
      }

      .nav a:hover {
        text-decoration: underline;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 3.6vw, 34px);
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
        font-size: 13px;
      }

      .toolbar {
        display: grid;
        gap: 12px;
        padding: 16px;
        margin-top: 18px;
      }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      button {
        border: 1px solid rgba(21, 62, 92, 0.22);
        background: rgba(21, 62, 92, 0.06);
        color: var(--ink);
        border-radius: 8px;
        padding: 9px 14px;
        font: 11px/1.2 Menlo, Monaco, "Courier New", monospace;
        cursor: pointer;
      }

      button:hover {
        background: rgba(21, 62, 92, 0.12);
      }

      .status {
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.52);
        white-space: pre-wrap;
        font: 11px/1.45 Menlo, Monaco, "Courier New", monospace;
      }

      .status.ok {
        color: var(--ok);
      }

      .status.bad {
        color: var(--bad);
      }

      #canvas-wrap {
        display: grid;
        justify-content: center;
        padding: 10px;
        margin-top: 18px;
        width: 100%;
        overflow: hidden;
      }

      canvas {
        display: block;
        border-radius: 6px;
        max-width: 100%;
        height: auto !important;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="nav"><a href="./index.html">All tests</a></div>
      <section class="panel toolbar">
        <h1>Fill Issue 43 Regression</h1>
        <p>
          This page is based on the GitHub issue repro: repeated
          <code>brush.fill()</code> plus <code>brush.rect()</code> and
          <code>brush.circle()</code> calls on a <code>WEBGL</code> canvas.
          The reporter saw crashes around fills 30-33 in v2.0.2-beta.
        </p>
        <div class="controls">
          <button type="button" onclick="runIssue43(38)">Run 38 fills</button>
          <button type="button" onclick="runIssue43(60)">Run 60 fills</button>
          <button type="button" onclick="runIssue43(100)">Run 100 fills</button>
        </div>
        <div id="status" class="status">Waiting to run.</div>
      </section>

      <section id="canvas-wrap" class="panel"></section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      let currentInstance;

      function setStatus(message, tone = "") {
        statusEl.className = `status ${tone}`.trim();
        statusEl.textContent = message;
      }

      function mulberry32(seed) {
        return function () {
          let t = (seed += 0x6d2b79f5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      window.addEventListener("error", (event) => {
        setStatus(`Browser error:\n${event.message}`, "bad");
      });

      window.addEventListener("unhandledrejection", (event) => {
        const message = event.reason?.stack || event.reason?.message || String(event.reason);
        setStatus(`Unhandled rejection:\n${message}`, "bad");
      });

      function runIssue43(fillCount) {
        if (currentInstance) {
          currentInstance.remove();
        }

        setStatus(`Running ${fillCount} fill operations...`);

        currentInstance = new p5((p) => {
          brush.instance(p);

          p.setup = () => {
            const random = mulberry32(42);
            let completed = 0;

            try {
              const canvas = p.createCanvas(1280, 720, p.WEBGL);
              canvas.parent("canvas-wrap");

              brush.load();
              p.translate(-p.width / 2, -p.height / 2);
              p.randomSeed(42);
              brush.noStroke();

              for (let i = 0; i < fillCount; i++) {
                const color =
                  "#" +
                  Math.floor(random() * 16777215)
                    .toString(16)
                    .padStart(6, "0");

                brush.fill(color, 80);
                brush.fillBleed(0.3 + random() * 0.5, "out");
                brush.fillTexture(0.3, 0.2);

                if (i % 3 === 0) {
                  brush.circle(
                    random() * p.width,
                    random() * p.height,
                    40 + random() * 80,
                  );
                } else {
                  brush.rect(
                    random() * p.width,
                    random() * p.height,
                    100 + random() * 200,
                    50 + random() * 100,
                  );
                }

                completed = i + 1;
              }

              setStatus(
                `Success: completed ${completed}/${fillCount} fill operations without throwing.`,
                "ok",
              );
            } catch (error) {
              setStatus(
                `Failure after ${completed}/${fillCount} fills:\n${error.stack || error.message || error}`,
                "bad",
              );
              throw error;
            }

            p.noLoop();
          };
        }, document.getElementById("canvas-wrap"));
      }

      runIssue43(38);
    </script>
  </body>
</html>
